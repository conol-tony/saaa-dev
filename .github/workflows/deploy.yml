name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Check environment
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci 2>&1 || (npm ci 2>&1 | tee /tmp/npm-ci-error.txt && cat /tmp/npm-ci-error.txt && exit 1)

      - name: Upload npm error log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-error-log
          path: /tmp/npm-ci-error.txt

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: |
          rm -rf .wrangler
          rm -f dist/client/wrangler.json
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
